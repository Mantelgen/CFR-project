spring.application.name=backend

# Liquibase
spring.liquibase.enabled=false
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.default-schema=cfr_db
logging.level.liquibase=DEBUG
logging.level.org.liquibase=DEBUG

# Database
spring.datasource.url=jdbc:mysql://db-master:3306/cfr_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Session
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always

# Server
server.address=0.0.0.0
server.port=8080

# IMPORTANT (fix nginx redirect issue)
server.forward-headers-strategy=framework
