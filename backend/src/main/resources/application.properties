# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.cfr.networkapp=INFO
spring.application.name=backend

# Liquibase
spring.liquibase.enabled=false
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Database
spring.datasource.url=jdbc:mysql://db-master:3306/cfr_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none

# Session
spring.session.store-type=redis
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.session.redis.namespace=spring:session

server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.path=/
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Mail
spring.mail.host=${SPRING_MAIL_HOST:mailpit}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:3000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_SMTP_TIMEOUT:3000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_SMTP_WRITE_TIMEOUT:3000}
app.complaints.recipient=${APP_COMPLAINTS_RECIPIENT:complaints@cfr.local}
app.mail.from=${APP_MAIL_FROM:noreply@cfr.local.com}
app.mail.complaints-from=${APP_MAIL_COMPLAINTS_FROM:complaint@cfr.local.com}

# Server
server.address=0.0.0.0
server.port=8080
server.forward-headers-strategy=framework
app.public-base-url=${APP_PUBLIC_BASE_URL:http://cfr.local}

# Monitoring
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
