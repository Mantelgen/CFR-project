events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    # Enhanced log format for API monitoring
    log_format api_monitoring '$remote_addr - $remote_user [$time_local] "$request" '
                              '$status $body_bytes_sent "$http_referer" '
                              '"$http_user_agent" '
                              'request_time=$request_time '
                              'upstream_response_time=$upstream_response_time '
                              'upstream_addr=$upstream_addr '
                              'request_method=$request_method '
                              'request_uri=$request_uri';
    
    access_log /var/log/nginx/access.log api_monitoring;
    error_log /var/log/nginx/error.log warn;

    upstream backend_servers {
        zone backend_servers 64k;
        least_conn;
        server backend:8080 resolve max_fails=3 fail_timeout=30s;
    }

    upstream frontend_servers {
        server frontend:80 max_fails=3 fail_timeout=30s;
    }

    # Main server block - serves frontend and proxies API to backend
    server {
        listen 80;
        server_name cfr.local www.cfr.local;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

	location /login {
    		proxy_pass http://backend_servers;
    		proxy_http_version 1.1;

    		proxy_set_header Host $host;
		proxy_set_header Cookie $http_cookie;
    		proxy_set_header X-Real-IP $remote_addr;
    		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    		proxy_set_header X-Forwarded-Proto $scheme;
	}

        # Proxy API requests to backend
        location /api/ {
            # Access Control Lists - Restrict API access
            allow 192.168.0.0/16;    # Private networks
            allow 172.16.0.0/12;     # Docker bridge networks
            allow 10.0.0.0/8;        # Docker internal networks
            allow 127.0.0.1;         # Localhost
            deny all;                # Deny all other IPs
            
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
	    proxy_set_header Cookie $http_cookie;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            
            # Error handling
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Serve frontend for all other requests
        location / {
            proxy_pass http://frontend_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }
    }

    # Backend direct access (optional, for testing)
    server {
        listen 8080;
        server_name cfr.local www.cfr.local;

        location / {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
	    proxy_set_header Cookie $http_cookie;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Nginx metrics endpoint for Prometheus
        location /stub_status {
            stub_status on;
            access_log off;
        }
    }
   server {
	listen 8443 ssl;
	server_name cfr.local www.cfr.local;
	ssl_certificate /etc/nginx/certs/cfr.crt;
	ssl_certificate_key /etc/nginx/certs/cfr.key;
	
	ssl_protocols TLSv1.2 TLSv1.3;
	location /api/ {
        # Access Control Lists - keep HTTPS and HTTP policy consistent
        allow 192.168.0.0/16;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;

		proxy_pass http://backend_servers;
        proxy_http_version 1.1;
		proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
	}
	
	location / {
		proxy_pass http://frontend_servers;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	}

	location /login {
    		proxy_pass http://backend_servers;
    		proxy_http_version 1.1;

    		proxy_set_header Host $host;
		proxy_set_header Cookie $http_cookie;
    		proxy_set_header X-Real-IP $remote_addr;
    		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    		proxy_set_header X-Forwarded-Proto $scheme;
	}

    }
	
}
