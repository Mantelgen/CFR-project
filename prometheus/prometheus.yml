global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'cfr-monitor'

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # MySQL Master metrics
  - job_name: 'mysql-master'
    static_configs:
      - targets: ['mysql-exporter:9104']
        labels:
          instance: 'mysql-master'

  # Nginx metrics
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          instance: 'nginx-lb'

  # Spring Boot backend (if actuator is enabled)
  - job_name: 'backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend1:8080', 'backend2:8080', 'backend3:8080']
        labels:
          application: 'cfr-backend'
