services:
  db-master:
    image: mysql:8.0
    container_name: mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cfr_db
    volumes:
      - db-master-data:/var/lib/mysql
      - ./mysql/master/master.cnf:/etc/mysql/conf.d/master.cnf:ro
      - ./mysql/master/init-master.sql:/docker-entrypoint-initdb.d/init-master.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--protocol=TCP", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 120s

  db-slave:
    image: mysql:8.0
    container_name: mysql-slave
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db-slave-data:/var/lib/mysql
      - ./mysql/slave/slave.cnf:/etc/mysql/conf.d/slave.cnf:ro
    depends_on:
      db-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--protocol=TCP", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 360s

  replication-setup:
    image: mysql:8.0
    restart: "no"
    depends_on:
      db-master:
        condition: service_healthy
      db-slave:
        condition: service_healthy
    volumes:
      - ./mysql/slave/init-slave.sh:/init-slave.sh:ro
    entrypoint: bash /init-slave.sh

  migration:
    build: ./backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-master:3306/cfr_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - SPRING_LIQUIBASE_ENABLED=true
      - SPRING_MAIN_WEB_APPLICATION_TYPE=none
      - SPRING_SESSION_STORE_TYPE=none
    depends_on:
      db-master:
        condition: service_healthy
    restart: "no"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOSTS: db-master,db-slave
      MYSQL_ROOT_PASSWORD: root_password
    depends_on:
      db-master:
        condition: service_healthy
      db-slave:
        condition: service_healthy

  backend:
    build: ./backend
    deploy:
      replicas: 3
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-master:3306/cfr_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - SPRING_LIQUIBASE_ENABLED=false
    depends_on:
      db-master:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  nginx:
    image: nginx:latest
    container_name: nginx-lb
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    ports:
      - "8080:8080"

volumes:
  db-master-data:
  db-slave-data: