services:

  db-master:
    image: mysql:8.0
    container_name: mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cfr_db
      MYSQL_ROOT_HOST: "%"
    volumes:
      - ./mysql/master/master.cnf:/etc/mysql/conf.d/master.cnf
      - ./mysql/master/init-master.sql:/docker-entrypoint-initdb.d/init-master.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-slave:
    image: mysql:8.0
    container_name: mysql-slave
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_ROOT_HOST: "%"
    volumes:
      - ./mysql/slave/slave.cnf:/etc/mysql/conf.d/slave.cnf
      - ./mysql/slave/init-slave.sh:/init-slave.sh
    depends_on:
      - db-master
    command: bash -c "docker-entrypoint.sh mysqld & sleep 15 && bash /init-slave.sh && wait"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOSTS: db-master,db-slave
      MYSQL_ROOT_PASSWORD: root_password
    depends_on:
      - db-master

  migration:
    build: ./backend
    command: >
        sh -c "
        echo 'Waiting for MySQL..';
        until mysql -h db-master -uroot -proot_password -e 'SELECT 1'; do
          sleep 3;
        done;
        echo 'MySQL ready';
        java -jar app.jar --spring.liquibase.enabled=true
        "
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-master:3306/cfr_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root_password
    depends_on:
      - db-master

  backend:
    build: ./backend
    depends_on:
      migration:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-master:3306/cfr_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root_password
      SPRING_LIQUIBASE_ENABLED: false
    deploy:
      replicas: 3

  nginx:
    image: nginx:latest
    container_name: nginx-lb
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      - backend
