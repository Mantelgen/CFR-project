services:
  db-master:
    image: mysql:8.0
    container_name: mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cfr_db
    volumes:
      - ./mysql/master/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3306:3306"

  db-slave:
    image: mysql:8.0
    container_name: mysql-slave
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - ./mysql/slave/my.cnf:/etc/mysql/conf.d/my.cnf
    depends_on:
      - db-master

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    links:
      - db-master
      - db-slave
    ports:
      - "8081:80"
    environment:
      PMA_HOSTS: db-master,db-slave
      MYSQL_ROOT_PASSWORD: root_password