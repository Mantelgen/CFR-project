services:

  db-master:
    image: mysql:8.0
    container_name: mysql-master
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cfr_db
    ports:
      - "3306:3306"
    volumes:
      - db-master-data:/var/lib/mysql
      - ./mysql/master/master.cnf:/etc/mysql/conf.d/master.cnf:ro
      - ./mysql/master/init-master.sql:/docker-entrypoint-initdb.d/init-master.sql:ro
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
      - cfr-network


  db-slave:
    image: mysql:8.0
    container_name: mysql-slave
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db-slave-data:/var/lib/mysql
      - ./mysql/slave/slave.cnf:/etc/mysql/conf.d/slave.cnf:ro
      - ./mysql/slave/init-slave-db.sql:/docker-entrypoint-initdb.d/init-slave-db.sql:ro
    depends_on:
      db-master:
        condition: service_healthy
    networks:
      - cfr-network


  replication-setup:
    image: mysql:8.0
    container_name: mysql-replication-init
    restart: "no"
    depends_on:
      db-master:
        condition: service_healthy
      db-slave:
        condition: service_started
    volumes:
      - ./mysql/slave/init-slave.sh:/init-slave.sh:ro
    entrypoint: ["bash","/init-slave.sh"]
    networks:
      - cfr-network


  migration:
    build:
      context: ./liquibase
    depends_on:
      db-master:
        condition: service_healthy
      replication-setup:
        condition: service_completed_successfully
    volumes:
      - ./backend/src/main/resources/db/changelog:/liquibase/changelog
    command:
      --searchPath=/liquibase/changelog
      --url=jdbc:mysql://db-master:3306/cfr_db
      --username=root
      --password=root_password
      --changeLogFile=db.changelog-master.xml
      update
    networks:
      - cfr-network

  frontend:
    build:
      context: ./frontend
    container_name: cfr-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - cfr-network


  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-master:3306/cfr_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root_password
      SPRING_LIQUIBASE_ENABLED: false
    depends_on:
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL","wget -q --spider http://localhost:8080/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - cfr-network


  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOSTS: db-master,db-slave
      MYSQL_ROOT_PASSWORD: root_password
    depends_on:
      - db-master
      - db-slave
    networks:
      - cfr-network


  nginx:
    image: nginx:latest
    container_name: nginx-lb
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "8080:8080"
    networks:
      - cfr-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    contsiner_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cfr-network
 
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    restart: unless-stopped
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5044:5044"
      - "9600:9600"
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    depends_on:
      - elasticsearch
    networks:
      - cfr-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - cfr-network
    depends_on:
      - elasticsearch

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: filebeat
    restart: unless-stopped
    user: root
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nginx-logs:/var/log/nginx:ro  # Shared with nginx
    networks:
      - cfr-network
    depends_on:
      - logstash

volumes:
  db-master-data:
  db-slave-data:

networks:
  cfr-network:
    driver: bridge
