services:
  db-master:
    image: mysql:8.0
    container_name: mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cfr_db
    volumes:
      - ./mysql/master:/etc/mysql/conf.d
    ports:
      - "3306:3306"

  db-slave:
    image: mysql:8.0
    container_name: mysql-slave
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - ./mysql/slave:/etc/mysql/conf.d
    depends_on:
      - db-master

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    links:
      - db-master
      - db-slave
    ports:
      - "8081:80"
    environment:
      PMA_HOSTS: db-master,db-slave
      MYSQL_ROOT_PASSWORD: root_password

  backend:
    build: ./backend
    deploy:
      replicas: 3
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-master:3306/cfr_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
    depends_on:
      - db-master

  nginx:
    image: nginx:latest
    container_name: nginx-lb
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    ports:
      - "8080:8080"